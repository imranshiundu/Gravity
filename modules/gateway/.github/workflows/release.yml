name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ── Build binaries ───────────────────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: locci-proxy
            artifact: locci-proxy-linux-amd64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: locci-proxy
            artifact: locci-proxy-linux-arm64
            use_cross: true

          - os: macos-latest      # Apple Silicon (arm64) — runs natively on M-series
            target: aarch64-apple-darwin  # and via Rosetta 2 on Intel Macs
            binary: locci-proxy
            artifact: locci-proxy-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install build dependencies (Linux native)
        if: matrix.os == 'ubuntu-latest' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake build-essential

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3 cmake
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV

      - name: Install cross (Linux aarch64)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Build & push Docker image ────────────────────────────────────────────────
  docker:
    name: Docker · docker.io/locci/proxy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: locci/proxy
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    # Run as long as the workflow wasn't cancelled — a partial build still produces a release.
    # Individual failed platform builds won't block the release; missing artifacts are skipped.
    if: |
      !cancelled() &&
      needs.docker.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: locci-proxy-*   # excludes Docker buildx cache artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for artifact in \
            artifacts/locci-proxy-linux-amd64/locci-proxy-linux-amd64 \
            artifacts/locci-proxy-linux-arm64/locci-proxy-linux-arm64 \
            artifacts/locci-proxy-darwin-arm64/locci-proxy-darwin-arm64; do
            [ -f "$artifact" ] && cp "$artifact" release/ || echo "skipped (build failed): $artifact"
          done
          chmod +x release/*
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            release/locci-proxy-linux-amd64
            release/locci-proxy-linux-arm64
            release/locci-proxy-darwin-arm64
          body: |
            ## locci-proxy ${{ steps.version.outputs.version }}

            ### Docker

            ```bash
            docker pull locci/proxy:${{ steps.version.outputs.version }}
            ```

            ### Binaries

            Download the binary for your platform, make it executable and run it with a config file.

            ```bash
            chmod +x locci-proxy-*
            ./locci-proxy-linux-amd64 --config config.yaml
            ```

            | Platform | Binary |
            |---|---|
            | Linux x64 | `locci-proxy-linux-amd64` |
            | Linux ARM64 | `locci-proxy-linux-arm64` |
            | macOS Apple Silicon | `locci-proxy-darwin-arm64` |

            ### Config

            See [`config.yaml`](https://github.com/${{ github.repository }}/blob/main/config.yaml) for a full example — set `mode`, `upstreams`, and either `load_balancer` or `api_gateway`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
