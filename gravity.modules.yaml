system:
  name: Gravity
  assistant: Grav
  mode: unified-monorepo

modules:
  - id: grav-core
    path: modules/grav-core
    language: typescript
    status: active
    capabilities:
      - assistant-core-patterns
      - terminal-agent-ux
      - sessions
      - tools

  - id: grav-ollama
    path: modules/grav-ollama
    language: go
    status: active
    interface_role: engine-only
    capabilities:
      - local-models
      - inference
      - serving

  - id: grav-memory
    path: modules/grav-memory
    language: python
    status: active
    capabilities:
      - memory
      - retrieval
      - indexing

  - id: grav-coding-openhands
    path: modules/grav-coding-openhands
    language: python
    status: active
    capabilities:
      - coding
      - agent-execution
      - software-tasks

  - id: grav-coding-aider
    path: modules/grav-coding-aider
    language: python
    status: active
    capabilities:
      - coding
      - cli
      - repository-editing

  - id: grav-coding-claw
    path: modules/grav-coding-claw
    language: rust
    status: active
    capabilities:
      - coding
      - agent-patterns

  - id: grav-defense
    path: modules/grav-defense
    language: python
    status: active
    capabilities:
      - defensive-security
      - audit
      - system-tooling

  - id: grav-gateway
    path: modules/grav-gateway
    language: rust
    status: active
    capabilities:
      - gateway
      - proxy
      - traffic-control

  - id: grav-ui
    path: modules/grav-ui
    language: typescript
    status: active
    interface_role: primary
    capabilities:
      - ui
      - dashboard
      - workspace

  - id: grav-channels
    path: modules/grav-channels
    language: python
    status: active
    interface_role: backend-only
    capabilities:
      - chat
      - plugins
      - multi-platform

  - id: grav-orchestration
    path: modules/grav-orchestration
    language: typescript
    status: active
    capabilities:
      - orchestration
      - agents
      - workflows

  - id: grav-voice-vibevoice
    path: modules/grav-voice-vibevoice
    language: python
    status: active
    capabilities:
      - speech-to-text
      - text-to-speech
      - voice-ai

  - id: grav-voice-realtime-agents
    path: modules/grav-voice-realtime-agents
    language: typescript
    status: active
    capabilities:
      - realtime
      - streaming-voice
      - voice-agents

  - id: grav-voice-console
    path: modules/grav-voice-console
    language: javascript
    status: active
    capabilities:
      - webrtc
      - realtime-console
      - voice-ui

planned_modules:
  - id: grav-business-operator
    status: planned
    capabilities:
      - business-workflows
      - connectors
      - operator-automation
