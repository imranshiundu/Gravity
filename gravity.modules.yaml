system:
  name: Gravity
  assistant: Grav
  mode: unified-monorepo

modules:
  - id: core
    path: modules/core
    language: typescript
    status: active
    capabilities:
      - assistant-core-patterns
      - terminal-agent-ux
      - sessions
      - tools

  - id: ollama
    path: modules/ollama
    language: go
    status: active
    interface_role: engine-only
    capabilities:
      - local-models
      - inference
      - serving

  - id: memory
    path: modules/memory
    language: python
    status: active
    capabilities:
      - memory
      - retrieval
      - indexing

  - id: coding-openhands
    path: modules/coding-openhands
    language: python
    status: active
    capabilities:
      - coding
      - agent-execution
      - software-tasks

  - id: coding-aider
    path: modules/coding-aider
    language: python
    status: active
    capabilities:
      - coding
      - cli
      - repository-editing

  - id: coding-claw
    path: modules/coding-claw
    language: rust
    status: active
    capabilities:
      - coding
      - agent-patterns

  - id: defense
    path: modules/defense
    language: python
    status: active
    capabilities:
      - defensive-security
      - audit
      - system-tooling

  - id: gateway
    path: modules/gateway
    language: rust
    status: active
    capabilities:
      - gateway
      - proxy
      - traffic-control

  - id: channels
    path: modules/channels
    language: python
    status: active
    interface_role: backend-only
    capabilities:
      - chat
      - plugins
      - multi-platform

  - id: orchestration
    path: modules/orchestration
    language: typescript
    status: active
    capabilities:
      - orchestration
      - agents
      - workflows

  - id: voice-vibevoice
    path: modules/voice-vibevoice
    language: python
    status: active
    capabilities:
      - speech-to-text
      - text-to-speech
      - voice-ai

apps:
  - id: web
    path: apps/web
    language: typescript
    status: active
    interface_role: primary
    capabilities:
      - ui
      - dashboard
      - workspace
      - assistant-surface

  - id: voice-console
    path: apps/voice-console
    language: javascript
    status: active
    interface_role: secondary
    capabilities:
      - webrtc
      - realtime-console
      - voice-ui

  - id: voice-realtime-agents
    path: apps/voice-realtime-agents
    language: typescript
    status: active
    interface_role: secondary
    capabilities:
      - realtime
      - streaming-voice
      - voice-agents

embedded_ui_sources:
  - source: modules/channels/dashboard
    integration_target: apps/web
    role: channels-admin-reference

  - source: modules/coding-openhands/frontend
    integration_target: apps/web
    role: coding-workflow-reference

  - source: modules/coding-openhands/openhands-ui
    integration_target: apps/web
    role: coding-workflow-reference

  - source: modules/defense/odk-web/frontend
    integration_target: apps/web
    role: defense-workflow-reference

  - source: modules/ollama/app/ui
    integration_target: apps/web
    role: engine-diagnostic-reference

planned_modules:
  - id: business-operator
    status: planned
    capabilities:
      - business-workflows
      - connectors
      - operator-automation
